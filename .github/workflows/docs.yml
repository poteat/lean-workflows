name: Build and deploy docs (reusable)

# Builds API docs with `doc-gen4` and deploys them to GitHub Pages.
#
# We do NOT use `leanprover-community/docgen-action` because it requires
# `lakefile.toml`; this workflow supports `lakefile.lean` packages too. The
# inverted-dependency pattern (throwaway `docbuild/` lakefile that requires
# both the package and `doc-gen4`) is otherwise the same.

on:
  workflow_call:
    inputs:
      package-name:
        description: >
          The Lake package name as it appears in `package «...»`
          (e.g. `bytes`). Used as the `name` field in the throwaway
          `docbuild/lakefile.toml` and as the argument to `lake update`.
        type: string
        required: true
      docs-targets:
        description: >
          Space-separated list of `:docs` facets to build
          (e.g. `Bytes:docs`). Typically `<DefaultTarget>:docs`.
        type: string
        required: true
      landing-page:
        description: >
          Optional. If set (e.g. `Bytes.html`), the generated `docs/index.html`
          is replaced with a meta-refresh to this path. The doc-gen4 default
          index is austere; module pages render the module docstring and so
          make a much better landing target.
        type: string
        required: false
        default: ''
      header-title:
        description: >
          Optional. If set, replaces the generic "Documentation" string in the
          page header (top-left of every doc page) with this value. Accepts
          HTML, so a breadcrumb like
          `<a href="https://example.com/">example.com</a> / mylib` works.
        type: string
        required: false
        default: ''
      hidden-modules:
        description: >
          Space-separated list of top-level module names to strip from the
          sidebar (`navbar.html`). The HTML files themselves are kept so
          in-page cross-references still work. Defaults to the four modules
          `doc-gen4` always emits regardless of your library. Pass `''` to
          show everything.
        type: string
        required: false
        default: 'Init Lake Lean Std'
      runs-on:
        description: GitHub-hosted runner image.
        type: string
        required: false
        default: ubuntu-latest

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ${{ inputs.runs-on }}
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: leanprover/lean-action@v1
        with:
          test: false

      - name: Resolve doc-gen4 revision from lean-toolchain
        id: docgen
        run: |
          set -euo pipefail
          # Match the project's pinned Lean: `v4.X.Y` / `v4.X.Y-rcN` use the
          # corresponding doc-gen4 tag; nightly uses `nightly-testing`; anything
          # else falls back to `main`.
          rev=main
          if [ -f lean-toolchain ]; then
            tc=$(cut -d: -f2 lean-toolchain)
            case "$tc" in
              v4.*.*-rc*|v4.*.*) rev="$tc" ;;
              *nightly*)         rev="nightly-testing" ;;
            esac
          fi
          echo "rev=$rev" >> "$GITHUB_OUTPUT"
          echo "doc-gen4 rev: $rev"

      - name: Build API documentation
        env:
          NAME: ${{ inputs.package-name }}
          DOCS_TARGETS: ${{ inputs.docs-targets }}
          DOC_GEN_REV: ${{ steps.docgen.outputs.rev }}
        run: |
          set -euo pipefail
          mkdir -p docbuild
          cat > docbuild/lakefile.toml <<EOF
          name = "docbuild"
          reservoir = false
          version = "0.1.0"
          packagesDir = "../.lake/packages"

          [[require]]
          name = "$NAME"
          path = "../"

          [[require]]
          scope = "leanprover"
          name = "doc-gen4"
          rev = "$DOC_GEN_REV"
          EOF

          cd docbuild
          # Suppresses a known non-blocking mathlib-cache warning during update.
          MATHLIB_NO_CACHE_ON_UPDATE=1 ~/.elan/bin/lake update "$NAME"
          ~/.elan/bin/lake build $DOCS_TARGETS

          cd ..
          mkdir -p site
          cp -r docbuild/.lake/build/doc site/docs

      - name: Redirect /docs/ to landing page
        if: inputs.landing-page != ''
        env:
          TARGET: ${{ inputs.landing-page }}
        run: |
          set -euo pipefail
          cat > site/docs/index.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Documentation</title>
            <link rel="canonical" href="./$TARGET">
            <meta http-equiv="refresh" content="0; url=./$TARGET">
            <script>location.replace('./$TARGET' + location.search + location.hash)</script>
          </head>
          <body>
            <p>Redirecting to <a href="./$TARGET">$TARGET</a>…</p>
          </body>
          </html>
          EOF

      - name: Rewrite header title
        if: inputs.header-title != ''
        env:
          TITLE: ${{ inputs.header-title }}
        run: |
          set -euo pipefail
          # The string `<span>Documentation</span>` appears once per page in the
          # top-left header of every doc-gen4 page. Replace globally. Input is
          # treated as HTML (so callers can wrap parts in <a>).
          python3 - <<'PY'
          import os, pathlib
          old = '<span>Documentation</span>'
          new = f"<span>{os.environ['TITLE']}</span>"
          n_files, n_hits = 0, 0
          for p in pathlib.Path('site/docs').rglob('*.html'):
              s = p.read_text(encoding='utf-8')
              if old in s:
                  p.write_text(s.replace(old, new), encoding='utf-8')
                  n_files += 1
                  n_hits += s.count(old)
          print(f'Rewrote header in {n_files} files ({n_hits} occurrences)')
          PY

      - name: Strip modules from sidebar
        if: inputs.hidden-modules != ''
        env:
          HIDDEN: ${{ inputs.hidden-modules }}
        run: |
          set -euo pipefail
          # Each top-level Library entry in navbar.html is a `<details
          # class="nav_sect" data-path="./<Module>.html">` block with arbitrary
          # nesting inside. We find each named entry by its data-path and
          # remove the matching balanced `<details>...</details>` slice.
          python3 - <<'PY'
          import os, re, pathlib
          path = pathlib.Path('site/docs/navbar.html')
          html = path.read_text(encoding='utf-8')
          modules = os.environ['HIDDEN'].split()
          tag_re = re.compile(r'</?details\b[^>]*>')
          removed = 0
          for mod in modules:
              start_pat = re.compile(
                  rf'<details class="nav_sect" data-path="\./{re.escape(mod)}\.html">'
              )
              while True:
                  m = start_pat.search(html)
                  if not m:
                      break
                  # Walk forward, counting open/close <details> to find the match.
                  depth = 1
                  pos = m.end()
                  for tm in tag_re.finditer(html, pos):
                      depth += 1 if tm.group().startswith('<details') else -1
                      if depth == 0:
                          html = html[:m.start()] + html[tm.end():]
                          removed += 1
                          break
                  else:
                      raise SystemExit(f'unbalanced <details> for {mod}')
          path.write_text(html, encoding='utf-8')
          print(f'Stripped {removed} sidebar entries: {modules}')
          PY

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
